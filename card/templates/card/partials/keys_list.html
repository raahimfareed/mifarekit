<div id="keys-list" class="space-y-2">
    {% for key in known_keys %}
    <div class="flex items-center justify-between bg-gray-800 border border-gray-700 rounded-lg px-4 py-3">
        <div>
            <p class="text-sm text-gray-200 font-medium">{{ key.name }}</p>
            <p class="font-mono text-xs text-green-400 mt-0.5">{{ key.key }}</p>
            {% if key.sector is not None %}
            <p class="text-xs text-gray-500 mt-0.5">Sector {{ key.sector }}</p>
            {% endif %}
            {% if key.description %}
            <p class="text-xs text-gray-500 mt-0.5">{{ key.description }}</p>
            {% endif %}
        </div>
        <button hx-delete="{% url 'keys_delete' key.pk %}"
                hx-target="#keys-list"
                hx-swap="outerHTML"
                class="text-xs text-red-400 hover:text-red-300 transition">
            Delete
        </button>
    </div>
    {% empty %}
    <p class="text-gray-500 text-sm">No saved keys</p>
    {% endfor %}
</div>
