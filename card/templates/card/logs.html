{% extends 'card/base.html' %}

{% block title %}Logs - MifareKit{% endblock %}

{% block content %}
<div class="mb-8 flex items-center justify-between">
    <div>
        <h1 class="text-2xl font-bold text-white">Operation Logs</h1>
        <p class="text-gray-400 text-sm mt-1">Last 100 operations</p>
    </div>
    <button hx-delete="{% url 'logs_clear' %}"
            hx-target="#logs-list"
            hx-swap="outerHTML"
            hx-confirm="Clear all logs?"
            class="text-sm text-red-400 hover:text-red-300 border border-red-900 hover:border-red-800 px-4 py-2 rounded-lg transition">
        Clear Logs
    </button>
</div>

{% include 'card/partials/logs_list.html' %}
{% endblock %}
