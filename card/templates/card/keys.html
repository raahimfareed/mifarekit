{% extends 'card/base.html' %}

{% block title %}Keys - MifareKit{% endblock %}

{% block content %}
<div class="mb-8">
    <h1 class="text-2xl font-bold text-white">Saved Keys</h1>
    <p class="text-gray-400 text-sm mt-1">Manage known sector keys</p>
</div>

<div id="form-error" class="mb-4"></div>

<div class="grid grid-cols-1 md:grid-cols-2 gap-6">

    <div class="bg-gray-900 border border-gray-800 rounded-xl p-6">
        <h2 class="text-sm font-medium text-gray-400 uppercase tracking-wider mb-4">Add Key</h2>
        <form hx-post="{% url 'keys_add' %}"
              hx-target="#keys-list"
              hx-swap="outerHTML"
              hx-on::after-request="this.reset()"
              class="space-y-4">
            {% csrf_token %}

            <div>
                <label class="block text-xs text-gray-400 uppercase tracking-wider mb-1.5">Name</label>
                <input type="text" name="name" required
                    class="w-full bg-gray-800 border border-gray-700 text-gray-200 text-sm rounded-lg px-3 py-2 focus:outline-none focus:border-blue-500"
                    placeholder="Default key">
            </div>

            <div>
                <label class="block text-xs text-gray-400 uppercase tracking-wider mb-1.5">Key (hex, 12 chars)</label>
                <input type="text" name="key" maxlength="12" required
                    class="w-full bg-gray-800 border border-gray-700 text-gray-200 text-sm font-mono rounded-lg px-3 py-2 focus:outline-none focus:border-blue-500"
                    placeholder="FFFFFFFFFFFF">
            </div>

            <div>
                <label class="block text-xs text-gray-400 uppercase tracking-wider mb-1.5">Sector (optional)</label>
                <select name="sector" class="w-full bg-gray-800 border border-gray-700 text-gray-200 text-sm rounded-lg px-3 py-2 focus:outline-none focus:border-blue-500">
                    <option value="">Any sector</option>
                    {% for i in "0123456789" %}
                    <option value="{{ i }}">Sector {{ i }}</option>
                    {% endfor %}
                    <option value="10">Sector 10</option>
                    <option value="11">Sector 11</option>
                    <option value="12">Sector 12</option>
                    <option value="13">Sector 13</option>
                    <option value="14">Sector 14</option>
                    <option value="15">Sector 15</option>
                </select>
            </div>

            <div>
                <label class="block text-xs text-gray-400 uppercase tracking-wider mb-1.5">Description (optional)</label>
                <input type="text" name="description"
                    class="w-full bg-gray-800 border border-gray-700 text-gray-200 text-sm rounded-lg px-3 py-2 focus:outline-none focus:border-blue-500"
                    placeholder="e.g. Factory default key">
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white text-sm font-medium px-4 py-2.5 rounded-lg transition">
                Save Key
            </button>
        </form>
    </div>

    <div class="bg-gray-900 border border-gray-800 rounded-xl p-6">
        <h2 class="text-sm font-medium text-gray-400 uppercase tracking-wider mb-4">Saved Keys</h2>
        {% include 'card/partials/keys_list.html' %}
    </div>

</div>
{% endblock %}
