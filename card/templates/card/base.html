<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MifareKit{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

    <nav class="bg-gray-900 border-b border-gray-800 px-6 py-4">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <a href="{% url 'dashboard' %}" class="text-lg font-bold text-white tracking-tight">
                MifareKit
            </a>
            <div class="flex items-center gap-6 text-sm text-gray-400">
                <a href="{% url 'dashboard' %}" class="hover:text-white transition">Dashboard</a>
                <a href="{% url 'dump_card' %}" class="hover:text-white transition">Dump</a>
                <a href="{% url 'read_block' %}" class="hover:text-white transition">Read</a>
                <a href="{% url 'write_block' %}" class="hover:text-white transition">Write</a>
                <a href="{% url 'change_key' %}" class="hover:text-white transition">Change Key</a>
                <a href="{% url 'keys' %}" class="hover:text-white transition">Keys</a>
                <a href="{% url 'logs' %}" class="hover:text-white transition">Logs</a>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
